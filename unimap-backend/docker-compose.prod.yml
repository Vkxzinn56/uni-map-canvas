version: "3.9"

# ══════════════════════════════════════════════════════════
# UniMap 3.0 — Docker Compose PRODUCTION override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# ══════════════════════════════════════════════════════════

services:
  api:
    build:
      target: production
    environment:
      APP_ENV: production
      DEBUG: "false"
    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --no-access-log
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  worker:
    build:
      target: production
    environment:
      APP_ENV: production
    restart: always

  postgres:
    ports: []  # No external exposure in prod
    restart: always

  redis:
    ports: []  # No external exposure in prod
    restart: always
